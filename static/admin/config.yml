backend:
  name: github
  repo: booklice/booklice # 실제 없어도 됨(더미여도 됨)
  branch: main

# backend:
#   name: test-repo

app_title: KUMA

logo:
  src: ../assets/logo.png
  show_in_header: true

i18n:
  structure: single_file
  locales: [ko, en]
  default_locale: ko

media_folder: /static/assets
public_folder: /assets

media_libraries:
  default:
    config:
      transformations:
        raster_image:
          format: webp
          quality: 80
          width: 1200
          height: 1200
        svg:
          optimize: true

collections:
  - name: exhibition
    label: KUMA Exhibitions
    folder: /content/exhibitions
    create: true
    media_folder: "{{media_folder}}/exhibitions/{{slug}}"
    public_folder: "{{public_folder}}/exhibitions/{{slug}}"
    i18n: true
    fields:
      - name: title
        label: 제목
        widget: string
        i18n: true
        required: true

      - name: type
        label: 유형
        widget: string
        i18n: true
        required: true

      - name: startDate
        label: 시작일
        widget: datetime
        type: date
        i18n: duplicate
        required: true

      - name: endDate
        label: 종료일
        widget: datetime
        type: date
        i18n: duplicate
        required: true

      - name: description
        label: 설명
        widget: richtext
        i18n: true
        required: true

      - name: images
        label: 이미지
        widget: file
        i18n: duplicate
        multiple: true
        required: false

  - name: resources
    label: KUMA Resources
    folder: /content/resources
    required: false
    media_folder: "{{media_folder}}/resources/{{slug}}"
    public_folder: "{{public_folder}}/resources/{{slug}}"
    fields:
      - name: type
        label: 형식
        widget: string
        hint: PDF 등

      - name: item
        label: 제목
        widget: string
        hint: 대관신청서 등

      - name: link
        label: 링크
        widget: string
        hint: Google Drive 공유 링크 등

  - name: news
    label: KUMA News
    folder: /content/news
    required: false
    media_folder: "{{media_folder}}/resources/{{slug}}"
    public_folder: "{{public_folder}}/resources/{{slug}}"
    fields:
      - name: type
        label: 형식
        widget: string
        hint: 보도자료 등

      - name: item
        label: 제목
        widget: string

      - name: link
        label: 링크
        widget: string
        hint: https:// 로 시작하는 URL

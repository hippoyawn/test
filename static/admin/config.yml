backend:
  name: github
  repo: booklice/booklice
  branch: main

# backend:
#   name: test-repo

app_title: KUMA TEST

logo:
  src: ../assets/logo.png
  show_in_header: true

i18n:
  structure: single_file
  locales: [ko, en]
  default_locale: ko

media_folder: /static/assets
public_folder: /assets

media_libraries:
  default:
    config:
      transformations:
        raster_image:
          format: webp
          quality: 80
          width: 1200
          height: 1200
        svg:
          optimize: true

collections:
  - name: pages
    label: Pages
    i18n: true
    files:
      - name: kuma-about
        label: KUMA About
        i18n: true
        file: content/kuma-about/index.md
        fields:
          - label: 사진
            name: image
            widget: image
            i18n: duplicate
            required: true

          - label: 소개
            name: description
            widget: markdown
            i18n: true
            required: true

          - label: 대표 소장품
            name: collections
            widget: list
            summary: "{{fields.artist}} · {{fields.title}}"
            i18n: duplicate
            fields:
              - { label: 사진, name: image, widget: image }
              - { label: 분류, name: category, widget: string }
              - { label: 작가, name: artist, widget: string }
              - { label: 작품명, name: title, widget: string }
              - { label: 규격, name: size, widget: string }
              - { label: 제작연도, name: year, widget: number }

          - label: 운영위원회
            name: committee
            widget: list
            summary: "{{fields.role}} · {{fields.name}}"
            i18n: duplicate
            fields:
              - { label: 직책, name: role, widget: string }
              - { label: 이름, name: name, widget: string }
              - { label: 소속, name: affiliation, widget: string }

  - name: exhibition
    label: KUMA Exhibitions
    folder: /content/exhibitions
    create: true
    media_folder: "{{media_folder}}/exhibitions/{{slug}}"
    public_folder: "{{public_folder}}/exhibitions/{{slug}}"
    i18n: true
    fields:
      - name: title
        label: 제목
        widget: string
        i18n: true
        required: true

      - name: type
        label: 유형
        widget: string
        i18n: true
        required: true

      - name: startDate
        label: 시작일
        widget: datetime
        type: date
        i18n: duplicate
        required: true

      - name: endDate
        label: 종료일
        widget: datetime
        type: date
        i18n: duplicate
        required: true

      - name: description
        label: 설명
        widget: markdown
        i18n: true
        required: true

      - name: images
        label: 이미지
        widget: file
        i18n: duplicate
        multiple: true
        required: false

  - name: resources
    label: KUMA Resources
    folder: /content/resources
    required: false
    media_folder: "{{media_folder}}/resources/{{slug}}"
    public_folder: "{{public_folder}}/resources/{{slug}}"
    fields:
      - name: type
        label: 형식
        widget: string
        hint: PDF 등

      - name: title
        label: 제목
        widget: string
        hint: 대관신청서 등

      - name: link
        label: 링크
        widget: string
        hint: Google Drive 공유 링크 등

  - name: news
    label: KUMA News
    folder: /content/news
    required: false
    media_folder: "{{media_folder}}/resources/{{slug}}"
    public_folder: "{{public_folder}}/resources/{{slug}}"
    fields:
      - name: type
        label: 형식
        widget: string
        hint: 보도자료 등

      - name: title
        label: 제목
        widget: string

      - name: link
        label: 링크
        widget: string
        hint: https:// 로 시작하는 URL

<div class="container ex-kuma">
    <header>
        <div>
            <a href="/" class="title">EX-KUMA</a>
        </div>
        <nav>
            <a href="#exkuma-about">ABOUT</a>
            <a href="#exkuma-unsettled">UNSETTLED</a>
            <a href="#exkuma-workshop">WORKSHOP</a>
            <a href="#exkuma-news">NEWS</a>
            <button href="#" class="lang-button ex-kuma">EN</button>
        </nav>
    </header>

    <section>
        <div class="about-container" id="exkuma-about">
            {{ $about := site.GetPage "/exkuma-about" }}

            <div>
                <img src="{{ $about.Params.ko.image }}" alt="" />
            </div>

            <br />

            <div>
                <span data-lang="ko">
                    {{ $about.Params.ko.description | markdownify }}
                </span>

                <span data-lang="en">
                    {{ $about.Params.en.description | markdownify }}
                </span>
            </div>
        </div>
        <div class="unsettled-container" id="exkuma-unsettled">
            {{ range where site.RegularPages "Section" "exkuma-news" }}
            <div>News</div>
            <div class="title">
                <a
                    href="{{ .Params.link }}"
                    onclick="
                        let w = window.innerWidth * 0.5;
                        let h = window.innerHeight * 0.8;
                        window.open(
                            this.href,
                            'pdfwindow',
                            `width=${w},height=${h}`,
                        );
                        return false;
                    "
                >
                    {{ .Params.title }}
                </a>
            </div>
            {{ end }}
        </div>
        <div class="logos-container">
            <img class="logo" src="assets/ofm.png" alt="OFM" />
            <img class="logo" src="assets/boisbuchet.png" alt="Boisbuchet" />
        </div>
        <img class="full" src="assets/exkuma02.jpg" alt="EX-KUMA" />
    </section>
</div>
<script>
    const colorThemes = [
        { bg: "LemonChiffon", text: "FireBrick" },
        { bg: "LightCyan", text: "MediumBlue" },
        { bg: "HoneyDew", text: "DarkGreen" },
        { bg: "Lavender", text: "DarkMagenta" },
        { bg: "Moccasin", text: "SaddleBrown" },
        { bg: "MistyRose", text: "DarkRed" },
        { bg: "PapayaWhip", text: "Indigo" },
        { bg: "PaleGreen", text: "DarkBlue" },
        { bg: "Aquamarine", text: "DarkSlateBlue" },
        { bg: "LightGoldenRodYellow", text: "Crimson" },
        { bg: "AliceBlue", text: "DarkOrchid" },
        { bg: "BlanchedAlmond", text: "MediumVioletRed" },
        { bg: "PaleTurquoise", text: "Purple" },
        { bg: "Cornsilk", text: "Teal" },
        { bg: "Thistle", text: "DarkOliveGreen" },
        { bg: "PowderBlue", text: "Maroon" },
        { bg: "LightPink", text: "Navy" },
        { bg: "PaleGoldenRod", text: "DarkSlateGray" },
        { bg: "MediumSpringGreen", text: "FireBrick" },
        { bg: "Khaki", text: "Blue" },
    ];

    document.addEventListener("DOMContentLoaded", () => {
        const exKumaLangButton = document.querySelector(".lang-button.ex-kuma");
        const rightContainer = document.querySelector(".right");

        exKumaLangButton.addEventListener("click", () => {
            const now = rightContainer.dataset.language || "ko";
            const next = now === "ko" ? "en" : "ko";

            setLanguage(next, exKumaLangButton, rightContainer, "exkuma");
        });

        setLanguage(
            localStorage.getItem("exkuma-language") || "ko",
            exKumaLangButton,
            rightContainer,
            "exkuma",
        );

        const selected =
            colorThemes[Math.floor(Math.random() * colorThemes.length)];

        document
            .querySelector(".right")
            .style.setProperty("--exkuma-bg", selected.bg);
        document
            .querySelector(".right")
            .style.setProperty("--exkuma-text", selected.text);
    });
</script>
